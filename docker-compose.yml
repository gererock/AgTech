services:
  db:
    image: postgres:16-alpine
    container_name: agro-operativo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agro_operativo}
      POSTGRES_USER: ${POSTGRES_USER:-agro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agro}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - agro_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agro} -d ${POSTGRES_DB:-agro_operativo}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  agro_postgres_data:
